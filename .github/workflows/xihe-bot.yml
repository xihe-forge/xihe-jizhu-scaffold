name: Xihe AI Bot

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]
  discussion:
    types: [created]
  discussion_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  discussions: write

jobs:
  respond:
    runs-on: ubuntu-latest
    # Don't respond to ourselves or other bots
    if: >
      !contains(github.event.sender.login, '[bot]') &&
      github.event.sender.login != 'github-actions'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Xihe Bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_JSON: ${{ toJSON(github.event) }}
        run: node .github/scripts/xihe-bot.mjs
